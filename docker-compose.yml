services:
  # Legacy KVM engine - Xvnc + fluxbox + Firefox 52/Java + launch listener.
  # No published ports: Xvnc:5901 and launcher:9000 are reached only by `web`
  # over the compose network.
  console:
    build: .
    container_name: bmc-console
    env_file:
      - path: .env
        required: false   # local dev uses .env; Portainer injects vars itself
    volumes:
      # ISOs for virtual media → appear in the console's Image File picker at /isos
      - ./isos:/isos:ro
      # Persist the FF profiles so a one-time cert-exception (and window size)
      # survives rebuilds - accept the BMC cert once, never see it again.
      - ilo-profile:/root/.ff52-ilo
      - idrac-profile:/root/.ffesr-idrac
      # Persist IcedTea-Web trust decisions ("Always trust this publisher") so
      # Java applet/JNLP signature prompts stay dismissed across recreates.
      # Seeded on first creation from the image's pre-baked trusted.certs.
      - icedtea-trust:/root/.config/icedtea-web/security
    restart: unless-stopped

  # Sinatra + Tailwind control panel; also serves noVNC and proxies its
  # WebSocket to console:5901. This is the only thing you open in a browser.
  web:
    build: ./web
    container_name: bmc-web
    env_file:
      - path: .env
        required: false   # local dev uses .env; Portainer injects vars itself
    environment:
      CONSOLE_HOST: console
      VNC_PORT: "5901"
    volumes:
      # persists the CRUD server list (seeded from .env on first run)
      - servers-data:/data
    ports:
      # Bind to loopback by default so the app is NOT exposed on the LAN - a
      # reverse proxy (NPM) on this host fronts it with TLS. Set WEB_BIND in
      # .env (e.g. 0.0.0.0) only if you must reach :8088 directly off-box.
      - "${WEB_BIND:-127.0.0.1}:8088:8088"
    depends_on: [console]
    restart: unless-stopped

volumes:
  ilo-profile:
  idrac-profile:
  icedtea-trust:
  servers-data:

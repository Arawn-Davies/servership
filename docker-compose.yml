services:
  # Legacy KVM engine - Xvnc + fluxbox + Firefox 52/Java + launch listener.
  # No published ports: Xvnc:5901 and launcher:9000 are reached only by `web`
  # over the compose network.
  console:
    build: .
    container_name: bmc-console
    env_file: [.env]
    volumes:
      # ISOs for virtual media → appear in the console's Image File picker at /isos
      - ./isos:/isos:ro
      # Persist the FF profiles so a one-time cert-exception (and window size)
      # survives rebuilds - accept the BMC cert once, never see it again.
      - ilo-profile:/root/.ff52-ilo
      - idrac-profile:/root/.ffesr-idrac
    restart: unless-stopped

  # Sinatra + Tailwind control panel; also serves noVNC and proxies its
  # WebSocket to console:5901. This is the only thing you open in a browser.
  web:
    build: ./web
    container_name: bmc-web
    env_file: [.env]
    environment:
      CONSOLE_HOST: console
      VNC_PORT: "5901"
    ports:
      - "8088:8088"          # http://localhost:8088
    depends_on: [console]
    restart: unless-stopped

volumes:
  ilo-profile:
  idrac-profile:
